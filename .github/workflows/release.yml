name: Release

on:
  release:
    types: [published]

env:
  # Opt the bundled JS actions (checkout/cache/gh-release) onto Node.js 24 ahead
  # of the runner default flip, silencing the Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Enforce Homebrew tap-trust (the upcoming default); we only install core
  # formulae, so this just quiets the untrusted-tap advisory from the runner image.
  HOMEBREW_REQUIRE_TAP_TRUST: 1

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag:     ${{ steps.set.outputs.tag }}
    steps:
      - id: set
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: vars
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Windows is allowed to fail without failing the workflow run while the
    # GetPot / boost::filesystem issues are tracked separately. See
    # .claude/ticket_windows_build_fix.md. Remove `experimental: true` once
    # the Windows build is green.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-latest
            experimental: true

    steps:
      - uses: actions/checkout@v4

      # ── Linux dependencies ─────────────────────────────────────────────────
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev libboost-dev \
            libtbb-dev zlib1g-dev libeigen3-dev

      # ── macOS dependencies ─────────────────────────────────────────────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp mpfr boost tbb eigen

      # ── CGAL 6.1.1 from tarball (Linux + macOS) ───────────────────────────
      - name: Cache CGAL 6.1.1
        if: runner.os != 'Windows'
        id: cache-cgal
        uses: actions/cache@v4
        with:
          path: CGAL-6.1.1
          key: cgal-6.1.1

      - name: Download CGAL 6.1.1
        if: runner.os != 'Windows' && steps.cache-cgal.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L -o cgal.tar.xz \
            https://github.com/CGAL/cgal/releases/download/v6.1.1/CGAL-6.1.1.tar.xz
          tar -xJf cgal.tar.xz
          rm cgal.tar.xz

      # ── Windows dependencies via vcpkg ─────────────────────────────────────
      # Uses the vcpkg instance pre-installed on the runner.
      # CGAL from vcpkg may be a later 6.x patch; Windows is best-effort.
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install cgal tbb zlib --triplet x64-windows

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCGAL_DIR="${{ github.workspace }}/CGAL-6.1.1" \
            -DCPACK_PACKAGE_VERSION="${{ needs.vars.outputs.version }}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCPACK_PACKAGE_VERSION="${{ needs.vars.outputs.version }}"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package
        shell: bash
        run: cpack --config build/CPackConfig.cmake -C Release -B build

      # ── Checksums ──────────────────────────────────────────────────────────
      # SHA256 sidecars are consumed by pycemrg-meshing's ModelManager to verify
      # the downloaded tarball before unpacking. Format matches `sha256sum`:
      # "<hex>  <filename>" so `sha256sum -c` round-trips.
      - name: Compute checksums (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd build
          for f in meshtools3d-*.tar.gz meshtools3d-*.zip; do
            if [ -f "$f" ]; then
              if command -v sha256sum >/dev/null 2>&1; then
                sha256sum "$f" > "${f}.sha256"
              else
                shasum -a 256 "$f" > "${f}.sha256"
              fi
            fi
          done

      - name: Compute checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location build
          Get-ChildItem meshtools3d-*.zip, meshtools3d-*.tar.gz -ErrorAction SilentlyContinue | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Set-Content -Path "$($_.FullName).sha256" -Encoding Ascii
          }

      # ── Upload to GitHub Release ───────────────────────────────────────────
      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/meshtools3d-*.tar.gz
            build/meshtools3d-*.zip
            build/meshtools3d-*.sha256
